<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip | My Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="position-relative w-100 mb-4 d-flex justify-content-center align-items-center mt-3" style="max-width: 500px; padding: 0 1rem;">
        <a href="index.html" class="back-btn text-decoration-none fw-bold" aria-label="Go back">← Back</a>
        <h1 class="m-0 h4 fw-bold">My Books</h1>
    </header>

    <main class="container" style="max-width: 500px;">
        <ul class="nav nav-tabs mb-3 nav-fill" id="bookTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold" id="completed-tab" data-bs-toggle="tab" data-bs-target="#completed-books-content" type="button" role="tab" aria-controls="completed-books-content" aria-selected="true">
                    Completed
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold" id="favorites-tab" data-bs-toggle="tab" data-bs-target="#favorite-books-content" type="button" role="tab" aria-controls="favorite-books-content" aria-selected="false">
                    Favorites ⭐
                </button>
            </li>
        </ul>

        <div class="tab-content" id="bookTabsContent">
            <div class="tab-pane fade show active" id="completed-books-content" role="tabpanel" aria-labelledby="completed-tab">
                </div>
            
            <div class="tab-pane fade" id="favorite-books-content" role="tabpanel" aria-labelledby="favorites-tab">
                </div>
        </div>
    </main>

    <dialog id="dialog-edit-book" class="border-0 rounded-4 shadow-lg p-4" style="max-width: 400px; width: 90%;">
        <div class="dialog-content d-flex flex-column gap-3">
            <h2 class="h4 fw-bold mb-1">Edit Book</h2>
            <form id="edit-book-form">
                <input type="text" id="edit-title" class="form-control mb-2" placeholder="Title" required>
                <input type="text" id="edit-author" class="form-control mb-2" placeholder="Author" required>
                <input type="text" id="edit-length" class="form-control mb-2" placeholder="Length/Number of Pages" required>
                <input type="date" id="edit-date" class="form-control mb-2" required>
                <label class="fw-bold text-secondary mt-2 mb-1">Rating:</label>
                <div class="star-rating fs-3 text-warning mb-2">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <input type="hidden" id="edit-rating-value" value="0">
                <input type="text" id="edit-genre" class="form-control mb-4" placeholder="Genre (Optional)">
                <input type="hidden" id="edit-book-id">
                <button type="submit" class="btn btn-primary w-100 fw-bold mb-2">Update</button>
                <button type="button" class="btn btn-light w-100 text-muted" onclick="closeDialog('dialog-edit-book')">Cancel</button>
            </form>
        </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
