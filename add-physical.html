<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip | Add Physical Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="position-relative w-100 mb-4 d-flex justify-content-center align-items-center mt-3" style="max-width: 500px; padding: 0 1rem;">
        <a href="index.html" class="back-btn text-decoration-none fw-bold" aria-label="Go back">← Back</a>
        <h1 class="m-0 h4 fw-bold">Add Physical Book</h1>
    </header>

    <main class="container" style="max-width: 500px;">
        <div class="card shadow-sm border-0 rounded-4 p-4 bg-white">
            <form id="physical-book-form">
                <input type="text" id="physical-title" class="form-control form-control-lg mb-3" placeholder="Title" required>
                <input type="text" id="physical-author" class="form-control form-control-lg mb-3" placeholder="Author" required>
                <input type="number" id="physical-pages" class="form-control form-control-lg mb-3" placeholder="Number of Pages" required>
                <input type="date" id="physical-date" class="form-control form-control-lg mb-3" required>
                
                <label for="physical-rating" class="fw-bold text-secondary mb-1">Rating:</label>
                <div class="star-rating mb-3 fs-3 text-warning">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <input type="hidden" id="physical-rating-value" value="0">
                
                <input type="text" id="physical-genre" class="form-control form-control-lg mb-4" placeholder="Genre (Optional)">
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Save Book</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
