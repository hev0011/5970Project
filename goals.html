<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip | Goals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="position-relative w-100 mb-4 d-flex justify-content-center align-items-center mt-3" style="max-width: 500px; padding: 0 1rem;">
        <a href="index.html" class="back-btn text-decoration-none fw-bold" aria-label="Go back">← Back</a>
        <h1 class="m-0 h4 fw-bold">My Goals</h1>
    </header>

    <main class="container" style="max-width: 500px;">
        <div class="goals-container w-100">
            <h2 class="h5 mb-3 text-secondary border-bottom pb-2">Reading Goals</h2>

            <div id="active-goals" class="mb-4">
                <h3 class="h6 text-uppercase fw-bold text-primary mb-3">Working On</h3>
                <div id="active-list" class="d-flex flex-column gap-3"></div>
            </div>

            <div id="completed-goals" class="mb-4">
                <h3 class="h6 text-uppercase fw-bold text-success mb-3">Completed</h3>
                <div id="completed-list" class="d-flex flex-column gap-3"></div>
            </div>

            <button id="btn-new-goal" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mt-2" onclick="document.getElementById('dialog-new-goal').showModal()">Start New Goal</button>
        </div>
    </main>

    <dialog id="dialog-new-goal" class="border-0 rounded-4 shadow-lg p-4" style="max-width: 400px; width: 90%;">
        <div class="dialog-content d-flex flex-column gap-3">
            <h2 id="goal-dialog-title" class="h4 fw-bold mb-1">Start a New Goal</h2>
            <form id="goal-form">
                <input type="text" id="goal-name" class="form-control mb-3" placeholder="Goal Name" required>
                <input type="number" id="goal-target" class="form-control mb-3" placeholder="Target Number" min="1" required>
                <input type="number" id="goal-current" class="form-control mb-4" placeholder="Current Progress" min="0" required>
                <input type="hidden" id="goal-id">
                <button type="submit" id="goal-submit-btn" class="btn btn-primary w-100 fw-bold mb-2">Save Goal</button>
                <button type="button" class="btn btn-light w-100 text-muted" onclick="closeDialog('dialog-new-goal')">Cancel</button>
            </form>
        </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
