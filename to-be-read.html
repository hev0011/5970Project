<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Be Read | Flip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="position-relative w-100 mb-4 d-flex justify-content-center align-items-center mt-3" style="max-width: 500px; padding: 0 1rem;">
        <a href="index.html" class="back-btn text-decoration-none fw-bold" aria-label="Go back">← Back</a>
        <h1 class="m-0 h4 fw-bold">To Be Read List</h1>
    </header>

    <main class="container" style="max-width: 500px;">
        <button class="btn btn-primary w-100 py-3 shadow-sm fw-bold mb-4" onclick="document.getElementById('dialog-add-tbr').showModal()">➕ Add a Book to TBR</button>

        <div id="tbr-list-container" class="w-100">
        </div>
    </main>

    <dialog id="dialog-add-tbr" class="border-0 rounded-4 shadow-lg p-4" style="max-width: 400px; width: 90%;">
        <div class="dialog-content d-flex flex-column gap-3">
            <h2 class="h4 fw-bold mb-1">Add to TBR List</h2>
            <form id="add-tbr-form">
                <input type="text" id="add-tbr-title" class="form-control mb-3" placeholder="Title" required>
                <input type="text" id="add-tbr-author" class="form-control mb-4" placeholder="Author" required>
                <button type="submit" class="btn btn-primary w-100 fw-bold mb-2">Save to List</button>
                <button type="button" class="btn btn-light w-100 text-muted" onclick="document.getElementById('dialog-add-tbr').close()">Cancel</button>
            </form>
        </div>
    </dialog>

    <dialog id="dialog-edit-tbr" class="border-0 rounded-4 shadow-lg p-4" style="max-width: 400px; width: 90%;">
        <div class="dialog-content d-flex flex-column gap-3">
            <h2 class="h4 fw-bold mb-1">Edit TBR Book</h2>
            <form id="edit-tbr-form">
                <input type="text" id="edit-tbr-title" class="form-control mb-3" placeholder="Title" required>
                <input type="text" id="edit-tbr-author" class="form-control mb-4" placeholder="Author" required>
                <input type="hidden" id="edit-tbr-id">
                <button type="submit" class="btn btn-primary w-100 fw-bold mb-2">Update</button>
                <button type="button" class="btn btn-light w-100 text-muted" onclick="document.getElementById('dialog-edit-tbr').close()">Cancel</button>
            </form>
        </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
